<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Versona – Chat with Fictional Characters</title>
  <meta name="description" content="Chat with your favourite fictional characters from movies and web series using AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
</head>
<body>
  <div id="app">

    <!-- Navbar -->
    <nav id="navbar">
      <div class="nav-logo">
        <span>💬</span>
        Versona
      </div>
      <div class="nav-right" id="nav-right">
        <!-- rendered by JS -->
      </div>
    </nav>

    <!-- Main Layout -->
    <div id="main">

      <!-- Sidebar -->
      <aside id="sidebar">
        <!-- rendered by JS -->
      </aside>

      <!-- Chat Area -->
      <section id="chat-area">
        <!-- rendered by JS: welcome screen or chat interface -->
      </section>

    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
